<!DOCTYPE html>
<html>
<head>
    <title>Vivara: Home</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Roboto', 'Segoe UI', Arial, sans-serif;
    color: #202124;
    background-color: #ffffff;
    height: 100vh;
    overflow-x: hidden;
}
@media (prefers-color-scheme: dark) {
    body {
        color: #e8eaed;
        background-color: #202124;
    }
}

/* ── Layout ── */
.container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 85vh;
    padding: 0 16px;
}

/* ── Logo ── */
.logo {
    width: 200px;
    max-width: 40vw;
    height: 70px;
    margin-bottom: 40px;
    background-image: url("logo.png");
    background-repeat: no-repeat;
    background-position: center;
    background-size: contain;
    color-scheme: only light;
}

/* ── Search / Omnibox ── */
.search-wrapper {
    width: 100%;
    max-width: 584px;
    position: relative;
}

.search-box {
    display: flex;
    align-items: center;
    background: #fff;
    border: 1px solid #dfe1e5;
    border-radius: 24px;
    height: 46px;
    padding: 0 8px 0 14px;
    box-shadow: 0 1px 6px rgba(32,33,36,.28);
    transition: box-shadow 0.2s, border-color 0.2s;
}
.search-box:focus-within {
    box-shadow: 0 1px 6px rgba(32,33,36,.28), 0 4px 12px rgba(32,33,36,.18);
    border-color: transparent;
}
@media (prefers-color-scheme: dark) {
    .search-box {
        background: #303134;
        border-color: #5f6368;
        box-shadow: 0 1px 6px rgba(0,0,0,.5);
    }
    .search-box:focus-within {
        box-shadow: 0 1px 6px rgba(0,0,0,.5), 0 4px 12px rgba(0,0,0,.4);
    }
}

.search-icon {
    flex-shrink: 0;
    width: 20px;
    height: 20px;
    margin-right: 12px;
    background-image: url("search.svg");
    background-repeat: no-repeat;
    background-position: center;
    background-size: contain;
    opacity: 0.5;
}

.search-input {
    flex: 1;
    height: 100%;
    border: none;
    outline: none;
    font-size: 16px;
    color: #202124;
    background: transparent;
    min-width: 0;
}
@media (prefers-color-scheme: dark) {
    .search-input {
        color: #e8eaed;
    }
}
.search-input::placeholder {
    color: #9aa0a6;
}

.engine-icon {
    flex-shrink: 0;
    width: 24px;
    height: 24px;
    margin: 0 8px 0 4px;
    cursor: pointer;
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    border-radius: 50%;
    opacity: 0.8;
    transition: opacity 0.15s;
}
.engine-icon:hover {
    opacity: 1;
}

.mic-button {
    flex-shrink: 0;
    width: 32px;
    height: 32px;
    cursor: pointer;
    background-image: url("mic.svg");
    background-repeat: no-repeat;
    background-position: center;
    background-size: 18px;
    margin-left: 4px;
}

.lenz-button {
    flex-shrink: 0;
    width: 32px;
    height: 32px;
    cursor: pointer;
    background-image: url("search.svg");
    background-repeat: no-repeat;
    background-position: center;
    background-size: 18px;
    margin-left: 4px;
    opacity: 0.6;
    display: none;
}

/* ── Search engine dropdown ── */
.engine-dropdown {
    position: absolute;
    top: 52px;
    left: 50%;
    transform: translateX(-50%);
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 16px rgba(32,33,36,.25);
    padding: 8px 0;
    display: none;
    z-index: 10;
    min-width: 200px;
}
.engine-dropdown.active {
    display: block;
}
@media (prefers-color-scheme: dark) {
    .engine-dropdown {
        background: #303134;
        box-shadow: 0 4px 16px rgba(0,0,0,.5);
    }
}

.engine-item {
    display: flex;
    align-items: center;
    padding: 8px 16px;
    cursor: pointer;
    font-size: 14px;
    color: #202124;
    white-space: nowrap;
}
.engine-item:hover {
    background: #f1f3f4;
}
@media (prefers-color-scheme: dark) {
    .engine-item {
        color: #e8eaed;
    }
    .engine-item:hover {
        background: #3c4043;
    }
}

.engine-item img {
    width: 20px;
    height: 20px;
    margin-right: 12px;
    color-scheme: only light;
}

/* ── Suggestions grid ── */
.suggestions-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    width: 100%;
    max-width: 680px;
    margin-top: 44px;
    padding: 0 8px;
}

.sugg-tile {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px 8px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
    text-decoration: none;
    color: inherit;
    overflow: hidden;
    position: relative;
}
.sugg-tile:hover {
    background: rgba(32,33,36,0.06);
}
@media (prefers-color-scheme: dark) {
    .sugg-tile:hover {
        background: rgba(232,234,237,0.06);
    }
}

.sugg-tile .tile-icon {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: #f1f3f4;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 8px;
    overflow: hidden;
    flex-shrink: 0;
}
@media (prefers-color-scheme: dark) {
    .sugg-tile .tile-icon {
        background: #3c4043;
    }
}

.sugg-tile .tile-icon img {
    width: 24px;
    height: 24px;
    color-scheme: only light;
}

.sugg-tile .tile-title {
    font-size: 12px;
    font-weight: 500;
    text-align: center;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 100%;
    line-height: 1.4;
}

.sugg-tile .tile-url {
    font-size: 11px;
    color: #70757a;
    text-align: center;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 100%;
    line-height: 1.4;
}
@media (prefers-color-scheme: dark) {
    .sugg-tile .tile-url {
        color: #9aa0a6;
    }
}

.sugg-tile.empty .tile-icon {
    background: transparent;
}
.sugg-tile.empty .tile-title {
    color: transparent;
}

.tile-more {
    position: absolute;
    top: 4px;
    right: 4px;
    width: 20px;
    height: 20px;
    cursor: pointer;
    background-image: url("more.svg");
    background-repeat: no-repeat;
    background-position: center;
    background-size: 16px;
    opacity: 0;
    transition: opacity 0.15s;
    border-radius: 50%;
}
.sugg-tile:hover .tile-more {
    opacity: 0.6;
}
.tile-more:hover {
    opacity: 1;
    background-color: rgba(32,33,36,0.1);
}

::-webkit-input-placeholder { color: #9aa0a6; }
::-moz-placeholder { color: #9aa0a6; }
    </style>
</head>
<body>
<div class="container">
    <div class="logo"></div>

    <div class="search-wrapper">
        <div class="search-box">
            <div class="search-icon"></div>
            <input type="text" id="search-input" class="search-input" placeholder="Search or enter address">
            <div id="engine-toggle" class="engine-icon" onclick="onSearchEngineDropDownClick();" title="Change search engine"></div>
            <div id="mic-btn" class="mic-button" onclick="onSearchAction();" title="Voice search"></div>
            <div id="lenz-btn" class="lenz-button" onclick="onSearchAction();" title="Search"></div>
        </div>
        <div id="engine-list" class="engine-dropdown">
            <div class="engine-item" onclick="applySearchEngine('google', null, true);"><img src="favicons/google.png" /> Google</div>
            <div class="engine-item" onclick="applySearchEngine('bing', null, true);"><img src="favicons/bing.png" /> Bing</div>
            <div class="engine-item" onclick="applySearchEngine('yahoo', null, true);"><img src="favicons/yahoo.png" /> Yahoo!</div>
            <div class="engine-item" onclick="applySearchEngine('ddg', null, true);"><img src="favicons/ddg.png" /> DuckDuckGo</div>
            <div class="engine-item" onclick="applySearchEngine('yandex', null, true);"><img src="favicons/yandex.png" /> Yandex</div>
            <div class="engine-item" onclick="applySearchEngine('startpage', null, true);"><img src="favicons/startpage.png" /> Startpage</div>
            <div class="engine-item" onclick="applySearchEngine('custom', promptCustomSearchEngineUrl(), true);"><img src="favicons/custom.png" /> Custom</div>
        </div>
    </div>

    <div id="suggestions" class="suggestions-grid"></div>
</div>

<script>
// ── Search engine config ──
var searchEngineUrlMap = {
    "google": "https://www.google.com/search?q=[query]",
    "bing": "https://www.bing.com/search?q=[query]",
    "yahoo": "https://search.yahoo.com/search?p=[query]",
    "ddg": "https://duckduckgo.com/?q=[query]",
    "yandex": "https://yandex.com/search/?text=[query]",
    "startpage": "https://www.startpage.com/sp/search?query=[query]",
    "custom": ""
};
var recommendationsToDisplay = [];
var homePageLinksMode = "RECOMMENDATIONS";

// ── URL / domain detection ──
function isURL(text) {
    if (!text) return null;
    var t = text.trim();
    // already has protocol
    if (/^https?:\/\//i.test(t)) return t;
    // localhost with optional port/path
    if (/^localhost(:[0-9]+)?(\/.*)?$/i.test(t)) return "http://" + t;
    // IPv4 address
    if (/^(\d{1,3}\.){3}\d{1,3}(:[0-9]+)?(\/.*)?$/.test(t)) return "http://" + t;
    // domain-like: contains a dot, no spaces, has valid TLD, no consecutive dots
    if (t.indexOf('.') > -1 && t.indexOf(' ') === -1 && !t.startsWith('.') && !t.endsWith('.') && t.indexOf('..') === -1) {
        return "https://" + t;
    }
    return null;
}

// ── Suggestions tiles ──
function onIcoLoadError(element) {
    element.src = 'ic_not_available.svg';
    element.style.filter = "invert(1)";
}

function onSuggestionClicked(index) {
    var bookmark = null;
    if (homePageLinksMode === "BOOKMARKS" && window.hasOwnProperty("Vivara")) {
        bookmark = recommendationsToDisplay.find(function(b) { return b.order === index; });
        if (bookmark && Vivara.hasOwnProperty("markBookmarkRecommendationAsUseful")) {
            Vivara.markBookmarkRecommendationAsUseful(index);
        }
    } else {
        if (index >= recommendationsToDisplay.length) return;
        bookmark = recommendationsToDisplay[index];
    }
    if (!bookmark) return;
    var url = bookmark.dest_url ? bookmark.dest_url : bookmark.url;
    window.location.href = url;
}

function loadRecommendations() {
    return [
        {"title": "Wikipedia", "url":"https://www.wikipedia.org", "favicon": "https://ru.wikipedia.org/static/apple-touch/wikipedia.png"},
        {"title": "Reddit", "url":"https://www.reddit.com", "favicon": "https://www.redditstatic.com/desktop2x/img/favicon/apple-icon-120x120.png"},
        {"title": "My Tuner", "url":"https://mytuner-radio.com/", "favicon": "https://static2.mytuner.mobi/static/icons/apple-touch-icon-120x120-precomposed.png"},
        {"title": "Instagram", "url":"https://www.instagram.com", "favicon": "https://static.cdninstagram.com/rsrc.php/v3/ys/r/aM-g435MtEX.png"},
        {"title": "IMDb", "url":"https://www.imdb.com/", "favicon": "https://m.media-amazon.com/images/G/01/imdb/images-ANDW73HA/favicon_iPhone_retina_180x180._CB1582158069_UX60_.png"},
        {"title": "eBay", "url":"https://www.ebay.com/", "favicon": "https://www.ebay.com/apple-touch-icon.png"},
        {"title": "Itch.io", "url":"https://itch.io/games/input-gamepad/platform-web", "favicon": "https://itch.io/static/images/itchio-square-144.png"},
        {"title": "BBC News", "url":"https://www.bbc.com/news", "favicon": "https://www.bbc.com/apple-touch-icon-120x120-precomposed.png"}
    ];
}

function renderLinks(mode, linksArray) {
    homePageLinksMode = mode ? mode : "RECOMMENDATIONS";
    recommendationsToDisplay = linksArray ? linksArray : loadRecommendations();

    recommendationsToDisplay.map(function(c, i, arr) {
        if (!c.favicon) {
            var urlStr = c.url;
            try {
                var url = new URL(urlStr);
                c.favicon = url.origin + "/favicon.ico";
                if (window.hasOwnProperty("Vivara")) {
                    if (Vivara.requestFavicon) {
                        Vivara.requestFavicon(urlStr);
                    } else {
                        c.favicon = "favicon://" + url.host;
                    }
                }
            } catch (e) {
                console.log("Invalid URL: " + urlStr);
            }
        }
        return c;
    });

    var grid = document.getElementById("suggestions");
    grid.innerHTML = "";

    for (var i = 0; i < 8; i++) {
        var link;
        if (homePageLinksMode == "BOOKMARKS" && window.hasOwnProperty("Vivara")) {
            link = recommendationsToDisplay.find(function(c) { return c.order == i; });
        } else {
            link = recommendationsToDisplay[i];
        }

        var tile = document.createElement("div");
        tile.className = "sugg-tile";
        if (!link) tile.classList.add("empty");
        tile.onclick = (function(idx) { return function() { onSuggestionClicked(idx); }; })(i);

        var iconWrap = document.createElement("div");
        iconWrap.className = "tile-icon";

        var iconImg = document.createElement("img");
        if (link) {
            iconImg.src = link.favicon;
            iconImg.onerror = function() { onIcoLoadError(this); };
        }
        iconWrap.appendChild(iconImg);

        var titleEl = document.createElement("div");
        titleEl.className = "tile-title";
        titleEl.textContent = link ? link.title : "";

        var urlEl = document.createElement("div");
        urlEl.className = "tile-url";
        if (link) {
            try {
                urlEl.textContent = new URL(link.url).hostname;
            } catch (e) {
                urlEl.textContent = "";
            }
        }

        tile.appendChild(iconWrap);
        tile.appendChild(titleEl);
        tile.appendChild(urlEl);

        if (homePageLinksMode == "BOOKMARKS" && window.hasOwnProperty("Vivara")) {
            var moreEl = document.createElement("div");
            moreEl.className = "tile-more";
            moreEl.onclick = (function(idx) {
                return function(e) {
                    Vivara.onEditBookmark(idx);
                    e.stopPropagation();
                };
            })(i);
            tile.appendChild(moreEl);
        }

        grid.appendChild(tile);
    }
}

// ── Search engine dropdown ──
function onSearchEngineDropDownClick() {
    document.getElementById("engine-list").classList.toggle("active");
}

function promptCustomSearchEngineUrl() {
    var engine = localStorage.getItem("search-engine");
    var searchEngineUrl = localStorage.getItem("search-engine-url");
    searchEngineUrl = searchEngineUrl ? searchEngineUrl : searchEngineUrlMap[engine];
    return prompt("Enter search engine URL (with [query] as placeholder)", searchEngineUrl);
}

function applySearchEngine(engine, searchEngineUrl, notifyVivara) {
    document.getElementById("engine-list").classList.remove("active");

    searchEngineUrl = searchEngineUrl ? searchEngineUrl : searchEngineUrlMap[engine];

    localStorage.setItem("search-engine", engine);
    localStorage.setItem("search-engine-url", searchEngineUrl);

    var iconUrl = "";
    if (engine == "custom") {
        var urlOrigin = new URL(searchEngineUrl.replace("[query]", "")).origin;
        iconUrl = "https://t2.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&size=120&url=" + urlOrigin;
    } else {
        iconUrl = "favicons/" + engine + ".png";
    }
    document.getElementById("engine-toggle").style.backgroundImage = "url('" + iconUrl + "')";

    if (window.hasOwnProperty("Vivara") && notifyVivara) {
        Vivara.setSearchEngine(engine, searchEngineUrl ? searchEngineUrl : searchEngineUrlMap[engine]);
    }
}

// ── Search / navigate ──
function performSearch(text) {
    var url = isURL(text);
    if (url) {
        window.open(url, "_self");
        return;
    }
    var searchEngineUrl = localStorage.getItem('search-engine-url') ? localStorage.getItem('search-engine-url') : searchEngineUrlMap['google'];
    var searchUrl = searchEngineUrl.replace("[query]", encodeURIComponent(text));
    window.open(searchUrl, "_self");
}

function onSearchAction() {
    var micBtn = document.getElementById("mic-btn");
    if (micBtn.style.display === "none") {
        performSearch(document.getElementById("search-input").value);
    } else {
        if (window.hasOwnProperty("Vivara")) {
            Vivara.startVoiceSearch();
        }
    }
}

// ── Favicon callback (from Vivara GeckoView/WebView) ──
function onFaviconLoaded(url, data) {
    var imgElements = document.getElementsByTagName("img");
    for (var i = 0; i < imgElements.length; i++) {
        if (imgElements[i].src == "favicon://" + url) {
            imgElements[i].src = data;
        }
    }
}

function hideVoiceSearchUI() {
    document.getElementById("mic-btn").style.display = "none";
    document.getElementById("lenz-btn").style.display = "block";
}

// ── Utilities ──
var escape = document.createElement('textarea');
function escapeHTML(html) {
    escape.textContent = html;
    return escape.innerHTML;
}

// ── Initialization ──
var searchEngine = localStorage.getItem('search-engine') ? localStorage.getItem('search-engine') : "google";
var searchEngineUrl = localStorage.getItem('search-engine-url') ? localStorage.getItem('search-engine-url') : searchEngineUrlMap[searchEngine];

document.getElementById("search-input").addEventListener("keydown", function(e) {
    if (e.keyCode == 13) {
        performSearch(document.getElementById("search-input").value);
    }
});

// Click outside engine dropdown to close
document.addEventListener("click", function(e) {
    var dropdown = document.getElementById("engine-list");
    var toggle = document.getElementById("engine-toggle");
    if (dropdown.classList.contains("active") && !toggle.contains(e.target) && !dropdown.contains(e.target)) {
        dropdown.classList.remove("active");
    }
});

// Three modes:
// 1. Running inside ordinary web page - Vivara variable is not installed - no bookmarks, no voice search
// 2. Running inside Vivara WebView - Vivara variable is installed
// 3. Running inside Vivara GeckoView - Vivara variable is installed

if (window.hasOwnProperty("Vivara")) {
    console.log("Running inside Vivara");
    Vivara.onHomePageLoaded();
} else {
    hideVoiceSearchUI();
    applySearchEngine(searchEngine, searchEngineUrl, false);
    renderLinks();
}
</script>
</body>
</html>
